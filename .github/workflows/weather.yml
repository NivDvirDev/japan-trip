name: Bake weather

# Refreshes weather.json server-side on a schedule so a cold/offline open of the
# app still shows recent weather. The page (index.html) reads weather.json as a
# fallback after a live Open-Meteo fetch. GitHub cron is best-effort (can run
# 15-60 min late) and is auto-disabled after ~60 days of repo inactivity.

on:
  schedule:
    - cron: '17 */6 * * *'   # every 6 hours, off-the-hour to avoid peak-time drops
  workflow_dispatch:          # allow manual run from the Actions tab

permissions:
  contents: write             # needed for the bot to commit weather.json

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Open-Meteo and write weather.json
        run: |
          node -e '
          const https=require("https");
          const cities=[{n:"טוקיו",kj:"東",la:35.68,lo:139.69},{n:"קיוטו",kj:"京",la:35.01,lo:135.77}];
          function get(u){return new Promise((res,rej)=>{https.get(u,r=>{let d="";r.on("data",c=>d+=c);r.on("end",()=>{try{res(JSON.parse(d))}catch(e){rej(e)}});}).on("error",rej);});}
          (async()=>{
            const data=[];
            for(const c of cities){
              const j=await get(`https://api.open-meteo.com/v1/forecast?latitude=${c.la}&longitude=${c.lo}&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min,sunset&timezone=Asia%2FTokyo&forecast_days=1`);
              data.push({n:c.n,kj:c.kj,t:j.current.temperature_2m,c:j.current.weather_code,mx:j.daily.temperature_2m_max[0],mn:j.daily.temperature_2m_min[0],ss:(j.daily.sunset[0]||"").slice(11,16)});
            }
            require("fs").writeFileSync("weather.json",JSON.stringify({ts:Date.now(),data}));
            console.log("baked",JSON.stringify(data));
          })().catch(e=>{console.error(e);process.exit(1);});
          '

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add weather.json
          git diff --staged --quiet || git commit -m "chore: bake weather [skip ci]"
          git push
